# Database
spring.datasource.url=jdbc:postgresql://localhost:5433/schedule_db
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Server
server.port=8080

# Redis
spring.data.redis.host=localhost
spring.data.redis.port=6380

# Logging
logging.level.com.schedule=DEBUG

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT
jwt.secret=schedulemanagementprojectsecretkey12345678901234567890
jwt.expiration=86400000

# Actuator base path
management.server.port=8080

# Mail
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
app.mail.from=${MAIL_USERNAME}
app.mail.to=${MAIL_USERNAME}