name: CI - Prod Pipeline

on:
  push:
    branches:
      - main

jobs:
  test-and-push-prod:
    name: Test & Push Prod Image
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: schedule_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Run tests
        working-directory: backend/schedule-management
        run: mvn test -Dspring.profiles.active=test

      - name: Build JAR (skip tests — already ran)
        working-directory: backend/schedule-management
        run: mvn package -DskipTests

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Get short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Build & Push prod image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            abunahim/schedule-management:latest
            abunahim/schedule-management:prod
            abunahim/schedule-management:${{ steps.sha.outputs.short }}