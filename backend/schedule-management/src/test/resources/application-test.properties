spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Redis - disabled for tests
spring.data.redis.host=localhost
spring.data.redis.port=6370

# JWT
jwt.secret=testschedulemanagementprojectsecretkey12345678901234
jwt.expiration=86400000

# Mail
spring.mail.host=localhost
spring.mail.port=3025
app.mail.from=test@test.com
app.mail.to=test@test.com

# Disable mail and redis health checks
management.health.mail.enabled=false
spring.autoconfigure.exclude=org.springframework.boot.actuate.autoconfigure.mail.MailHealthContributorAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration